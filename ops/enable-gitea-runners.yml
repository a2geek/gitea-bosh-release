---
- type: replace
  path: /instance_groups/-
  value:
    name: gitea-runner
    instances: 1
    azs: [z1, z2]
    networks: [{name: default}]
    vm_type: default
    stemcell: default
    jobs:
    - name: bpm
      release: bpm
    - name: ca_certs
      release: os-conf
      properties:
        certs: ((gitea_web.certificate))
    - name: dockerd
      release: gitea
    - name: gitea-runner
      release: gitea
      properties:
        runner:
          capacity: 4
        registration:
          password: ((gitea_registration_password))
